{% extends "base.html" %}

{% block content %}
{% if request.user.is_authenticated %}
Author: {{ recipe.author.name }}
{% endif %}
<h2>{{ recipe.name }}</h2>
<ul>
    {% for ingredient in recipe.ingredients.all %}
    <li>{{ ingredient.ingredient.name }} - {{ ingredient.quantity }}</li>
    {% endfor %}
</ul>


{% endblock %}
