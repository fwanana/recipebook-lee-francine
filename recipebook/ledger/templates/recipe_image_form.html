{% extends "base.html" %}

{% block page_heading %}
Add image to {{ recipe.name }}
{% endblock %}

{% block content %}
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form }}
    <input type="submit" name="submit" value="Save Form">
</form>
<h4><a href="{{ recipe.get_absolute_url }}">Back to {{ recipe.name }}</a></h4>
{% endblock %}
