{% extends "base.html" %}

{% block page_title %}
Recipe List
{% endblock %}

{% block content %}
<ul>
    {% for recipe in recipes %}
    <li>
        <h3><a href="{{ recipe.get_absolute_url }}">{{ recipe.name }}</a></h3>
    </li>
    {% endfor %}
</ul>

<h3><a href="{% url 'ledger:recipe_create' %}">Add a New Recipe</a></h3>

{% endblock %}
