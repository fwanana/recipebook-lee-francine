<html lang="en">

<head>
    <title>Recipe Book</title>
</head>

<body>
    <header>
        <h1>Recipe Book</h1>
        {% if request.user.is_authenticated %}
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </header>
    <h2>{% block page_title %}{% endblock %}</h2>
    {% block content %}
    {% endblock %}
</body>

</html>
